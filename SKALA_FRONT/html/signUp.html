<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="./signUpResult.html" method="get">
        <fieldset>
            <legend>계정 정보</legend>

            <label for="userId">아이디:</label>
            <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
            (필수)
            <br><br>

            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" placeholder="8자 이상 입력" required>
            (필수)
            <br><br>

            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
            <select name="emailDomain" id="emailDomain">
                <option value="">직접 입력</option>
                <option value="gmail.com">gmail.com</option>
                <option value="naver.com">naver.com</option>
                <option value="daum.net">daum.net</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>

            <label for="name">이름:</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력하세요">
            <br><br>

            <label for="birth">생년월일:</label>
            <input type="date" id="birth" name="birth">
            <br><br>

            <span>성별:</span>
            <label><input type="radio" name="gender" value="male"> 남성</label>
            <label><input type="radio" name="gender" value="female"> 여성</label>
            <label><input type="radio" name="gender" value="none" checked> 선택안함</label>
            <br><br>

            <span>관심 분야:</span><br>
            <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
            <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
            <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
            <label><input type="checkbox" name="interest" value="cloud"> 클라우드 & 인프라</label>
            <br><br>

            <label for="path">가입 경로:</label>
            <select id="path" name="path">
                <option value="">-- 선택해 주세요 --</option>
                <option value="friend">친구 추천</option>
                <option value="search">검색</option>
                <option value="ad">광고</option>
                <option value="other">기타</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <label for="introduction">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
            <textarea id="introduction" name="introduction" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
        </fieldset>

        <br>
        <button type="submit">동의하고 회원가입</button>
        <button type="reset">다시 작성</button>
    </form>
    </div>
</body>
</html>

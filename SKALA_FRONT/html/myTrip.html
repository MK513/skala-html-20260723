<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>🧳 [과제] 나의 여행지</h1>
    <p>제가 다녀온 여행지를 사진, 음악, 영상으로 소개합니다.</p>
    <hr>

    <h2>🌍 나의 여행 앨범 🎵</h2>
    <p>여행지에서 들었던 빗소리와 함께 사진을 감상해보세요.</p>
    <audio controls>
        <source src="media/rain.mp3" type="audio/mpeg">
        브라우저가 오디오 재생을 지원하지 않습니다.
    </audio>

    <div class="trip-grid">
    <figure class="trip-card">
        <img src="media/forest1.jpeg" alt="숲길" width="500">
        <figcaption>고요한 숲길</figcaption>
    </figure>

    <figure class="trip-card">
        <img src="media/moon1.jpeg" alt="달" width="500">
        <figcaption>밤하늘의 달</figcaption>
    </figure>

    <figure class="trip-card">
        <img src="media/nature1.jpg" alt="자연 풍경" width="500">
        <figcaption>펼쳐진 자연 풍경</figcaption>
    </figure>
    </div>

    <hr>

    <h2>🎬 나의 여행 브이로그</h2>
    <p>여행 중 만난 폭포의 아름다운 순간을 담은 영상입니다.</p>
    <video controls width="500">
        <source src="media/waterfall1.mp4" type="video/mp4">
        브라우저가 비디오 재생을 지원하지 않습니다.
    </video>
    <p>시원한 폭포 소리 🎶</p>
    </div>
</body>
</html>
